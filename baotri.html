<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG ĐANG BẢO TRÌ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-green-500 min-h-screen flex items-center justify-center p-4">
    <div
        class="text-center bg-green-950/20 border-2 border-yellow-600 p-8 md:p-12 rounded shadow-[0_0_30px_rgba(202,138,4,0.3)] max-w-xl w-full relative overflow-hidden">
        <!-- Scanline Overlay -->
        <div
            class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] pointer-events-none">
        </div>

        <div class="relative z-10">
            <svg class="w-20 h-20 mx-auto mb-6 text-yellow-500 animate-pulse drop-shadow-[0_0_8px_rgba(234,179,8,0.8)]"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
            <h1
                class="text-2xl md:text-4xl font-bold text-white mb-4 tracking-wider uppercase drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]">
                TẠM NGỪNG TRUY CẬP
            </h1>
            <p
                class="text-yellow-400 font-mono text-sm md:text-base leading-relaxed tracking-widest border-t border-yellow-800/50 pt-4 mt-2">
                [HỆ THỐNG]: TRANG WEB HIỆN ĐANG ĐÓNG CỬA <br>BẢO TRÌ VÀ NÂNG CẤP DỮ LIỆU.<br>VUI LÒNG QUAY LẠI SAU!
            </p>
        </div>
    </div>
</body>

</html>
